name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) doesn't match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "✅ Version validated: v$CARGO_VERSION"

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Slint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libxkbcommon-dev libfontconfig-dev libwayland-dev

      - name: Build release
        run: cargo build --workspace --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbcompass-linux
          path: |
            target/release/dbcompass
            target/release/libhello_plugin.so
            target/release/libsqlite_plugin.so
            target/release/libmysql_plugin.so
            target/release/libpostgres_plugin.so
          if-no-files-found: warn

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --workspace --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbcompass-windows
          path: |
            target/release/dbcompass.exe
            target/release/hello_plugin.dll
            target/release/sqlite_plugin.dll
            target/release/mysql_plugin.dll
            target/release/postgres_plugin.dll
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [validate, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release archive
        run: |
          mkdir -p release-assets
          # Package Linux
          cd dbcompass-linux && tar czf ../release-assets/dbcompass-linux-x86_64.tar.gz . && cd ..
          # Package Windows
          cd dbcompass-windows && zip -r ../release-assets/dbcompass-windows-x86_64.zip . && cd ..

      - name: Generate changelog with git-cliff
        id: changelog
        run: |
          # Try using git-cliff if available, fallback to simple changelog
          if command -v git-cliff &> /dev/null; then
            git-cliff --config cliff.toml --unreleased --strip header > release-notes.md
          else
            echo "## What's Changed" > release-notes.md
            git log --pretty=format:"* %s" $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD >> release-notes.md || true
          fi

      - name: Generate changelog
        run: |
          if command -v git-cliff &> /dev/null; then
            git-cliff --config cliff.toml --unreleased --strip header > release-notes.md
          else
            echo "## v${{ github.ref_name }}" > release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"* %s" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD >> release-notes.md || true
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release-assets/dbcompass-linux-x86_64.tar.gz
            release-assets/dbcompass-windows-x86_64.zip
