name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

env:
  CARGO_TERM_COLOR: always

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-release
        run: cargo install cargo-release

      - name: Configure git
        run: |
          git config user.name "jean3690"
          git config user.email "jean3690@users.noreply.github.com"

      - name: Bump version
        run: |
          cargo release "${{ github.event.inputs.bump_type }}" \
            --no-publish \
            --no-confirm \
            --execute \
            --tag-prefix "v"

      - name: Generate changelog
        run: |
          # Extract new version from Cargo.toml
          NEW_VERSION="v$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
          echo "New version: $NEW_VERSION"

          # Generate changelog with git-cliff
          cargo install git-cliff
          git-cliff --config cliff.toml -o CHANGELOG.md

          # Commit changelog update
          git add CHANGELOG.md
          git commit -m "chore: update changelog for $NEW_VERSION" --allow-empty

      - name: Push changes
        run: git push --follow-tags origin HEAD
