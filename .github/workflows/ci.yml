name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "**/*.md"
      - "**/*.slint"
      - "ui/slintcn/**"
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Slint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libxkbcommon-dev libfontconfig-dev libwayland-dev

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbcompass-windows
          path: |
            target/debug/dbcompass.exe
            target/debug/hello_plugin.dll
            target/debug/sqlite_plugin.dll
            target/debug/mysql_plugin.dll
            target/debug/postgres_plugin.dll
          if-no-files-found: warn
